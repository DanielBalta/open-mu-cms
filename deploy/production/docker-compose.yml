services:
  nginx-80:
    image: nginx:alpine
    container_name: nginx-web-80
    ports:
      - "80:80"
    restart: "unless-stopped"
    volumes:
      - ./nginx.prod80.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot/:ro
    networks:
      - default
      - database_network

  nginx-443:
    container_name: nginx-web-443
    build:
      dockerfile: Dockerfile
      context: ../../client
    ports:
      - "443:443"
    volumes:
      - ./nginx.prod443.conf:/etc/nginx/nginx.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd
      - ./certbot/conf/:/etc/nginx/ssl/:ro
    networks:
      - default
      - database_network

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www/:/var/www/certbot/:rw
      - ./certbot/conf/:/etc/letsencrypt/:rw
    networks:
      - default
      - database_network

  cms-api:
    container_name: cms-api
    build:
      dockerfile: Dockerfile
      context: ../../server
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: openmu
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      ADMIN_PANEL_HOST: nginx-80
      ADMIN_PANEL_PORT: 80
      ADMIN_PANEL_USERNAME: admin
      ADMIN_PANEL_PASSWORD: openmu
    restart: "unless-stopped"
    ports:
      - "8085:8085"
    networks:
      - default
      - database_network

networks:
  default:
  database_network:
    name: all-in-one_default
    external: true